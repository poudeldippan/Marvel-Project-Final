<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MarvelVerse | Trivia Game</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-alt">
    <!-- Navbar -->
    <nav class="navbar" id="navbar">
        <div class="nav-container">
            <h1 class="logo"><a href="index.html" style="color:inherit;"><span class="marvel-bg">Marvel</span>Verse</a></h1>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="topics.html">Topics</a></li>
                <li><a href="game.html" class="active">Game</a></li>
                <li><a href="team.html">Team</a></li>
                <li><a href="contact.html">Contact</a></li>
                <li><button id="theme-toggle" class="theme-btn" aria-label="Toggle Dark Mode">🌙</button></li>
            </ul>
            <div class="hamburger">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </div>
        </div>
    </nav>

    <!-- Game Section -->
    <section class="game-section section-padding py-20" style="margin-top: 80px; min-height: 80vh; display: flex; align-items: center;">
        <div class="container" style="width: 100%; max-width: 800px;">
            <div class="game-container feature-card fade-in scroll-anim">
                <!-- Start Screen -->
                <div id="start-screen" class="text-center">
                    <h2 class="section-title">Wanna know whether you are the chosen one?</h2>
                    <div class="title-underline center-line" style="margin-bottom: 20px;"></div>
                    <img src="assets/marvel.jpg" alt="Challenge Accepted" style="max-width:300px; border-radius: 8px; box-shadow: 0 0 15px var(--primary-color); margin: 0 auto 20px auto; display:block;">
                    <p style="margin-bottom: 30px; font-size: 1.2rem; font-weight: bold; color: var(--accent-gold);">Test your knowledge and prove your worth in this epic 10-question gauntlet!</p>
                    <button id="start-btn" class="btn btn-primary">Start Game</button>
                </div>

                <!-- Quiz Screen -->
                <div id="quiz-screen" style="display: none;">
                    <div class="quiz-header" style="display: flex; justify-content: space-between; margin-bottom: 20px; font-weight: bold; border-bottom: 2px solid var(--border-color); padding-bottom: 10px;">
                        <span id="question-progress">Question 1/10</span>
                        <span id="score-display">Score: 0</span>
                    </div>

                    <h3 id="question-text" style="font-size: 1.5rem; margin-bottom: 20px; text-align: center;">Question text goes here?</h3>
                    
                    <div class="answers-grid" id="answers-container">
                        <!-- Buttons will be generated here by JS -->
                    </div>

                    <div style="text-align: center; margin-top: 20px; height: 60px;">
                        <p id="feedback-text" style="font-weight: bold; font-size: 1.2rem; margin-bottom: 10px;"></p>
                        <button id="next-btn" class="btn btn-primary" style="display: none; margin: 0 auto;">Next Question</button>
                    </div>
                </div>

                <!-- Result Screen -->
                <div id="result-screen" class="text-center" style="display: none;">
                    <h2 class="section-title">Mission Complete</h2>
                    <div class="title-underline center-line" style="margin-bottom: 20px;"></div>
                    <p style="font-size: 1.5rem; margin-bottom: 10px;">Your Score:</p>
                    <p id="final-score" style="font-size: 4rem; font-family: 'Bebas Neue'; color: var(--primary-color); margin-bottom: 20px;">0 / 10</p>
                    
                    <img id="result-image" src="" alt="Result Image" style="max-width: 300px; border-radius: 8px; box-shadow: 0 0 15px var(--primary-color); margin: 0 auto 20px auto; display: none;">
                    
                    <p id="result-message" style="margin-bottom: 30px; font-size: 1.2rem;"></p>
                    <button id="restart-btn" class="btn btn-primary">Play Again</button>
                </div>
            </div>
        </div>
    </section>


    <script src="script.js"></script>
    <style>
        .answers-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        .answer-btn {
            background-color: var(--bg-color);
            border: 2px solid var(--border-color);
            color: var(--text-color);
            padding: 15px;
            font-size: 1.1rem;
            border-radius: 8px;
            cursor: pointer;
            transition: var(--transition);
            font-family: inherit;
        }
        .answer-btn:hover {
            background-color: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }
        .answer-btn.correct {
            background-color: #28a745;
            color: white;
            border-color: #28a745;
        }
        .answer-btn.wrong {
            background-color: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }
        .answer-btn:disabled {
            cursor: not-allowed;
            opacity: 0.8;
        }
        @media (max-width: 600px) {
            .answers-grid { grid-template-columns: 1fr; }
        }
    </style>
</body>
</html>
